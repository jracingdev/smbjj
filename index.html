  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Domínio oficial: força HTTPS (Service Worker exige contexto seguro).
    (function () {
      var h = location.hostname;
      if (location.protocol === 'http:' &&
          (h === 'smbjj.com.br' || h === 'www.smbjj.com.br' || h === 'loja.smbjj.com.br')) {
        location.replace('https://' + location.host + location.pathname + location.search + location.hash);
      }
    })();
    // Remove service workers antigos — build web sem PWA/offline.
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (names) {
          names.forEach(function (name) {
            if (name.indexOf('flutter-') === 0) caches.delete(name);
          });
        });
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
