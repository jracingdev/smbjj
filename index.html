<body>
  <script>
    // Migração única: limpa service worker antigo (ex.: v1.7.0) que impedia ?loja=publica.
    (function () {
      var migrationKey = 'ct_sm_bjj_sw_migration';
      var migrationVersion = 'v1.7.14-domain';
      if (localStorage.getItem(migrationKey) === migrationVersion) return;
      localStorage.setItem(migrationKey, migrationVersion);
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (names) {
          names.forEach(function (name) {
            if (name.indexOf('flutter-') === 0) caches.delete(name);
          });
        });
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
