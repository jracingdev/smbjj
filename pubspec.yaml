name: ct_sm_bjj
description: CT SM BJJ - Gestão de Academia de Jiu-Jitsu
publish_to: 'none'
version: 1.3.1+16

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend Supabase (substitui SQLite)
  supabase_flutter: ^2.8.4

  # HTTP (ViaCEP + Mercado Pago)
  http: ^1.2.1

  # UI
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

  # Utilidades
  url_launcher: ^6.3.0
  intl: 0.20.2
  provider: ^6.1.2
  uuid: ^4.4.2
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/gft_logo.png
